<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER_VAULT v6.0 | ULTIMATE AES-256</title>
    <script src="https://cdn.jsdelivr.net/npm/@zip.js/zip.js/dist/zip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        :root { --neon: #00ff41; --bg: #050a0f; --glass: rgba(5, 10, 15, 0.95); --alert: #ff003c; }
        body { background: var(--bg); color: var(--neon); font-family: 'Fira Code', monospace; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: var(--glass); border: 1px solid var(--neon); padding: 25px; width: 100%; max-width: 800px; box-shadow: 0 0 25px rgba(0,255,65,0.2); border-radius: 8px; position: relative; z-index: 2; }
        h2 { text-align: center; letter-spacing: 3px; text-transform: uppercase; border-bottom: 1px solid var(--neon); padding-bottom: 10px; }
        .tabs { display: flex; gap: 10px; margin: 20px 0; }
        .tab-btn { flex: 1; padding: 10px; background: transparent; border: 1px solid #2ea043; color: #6e7681; cursor: pointer; font-size: 12px; }
        .tab-btn.active { color: var(--neon); border-color: var(--neon); box-shadow: inset 0 0 10px rgba(0,255,65,0.2); }
        .content { display: none; border: 1px solid #2ea043; padding: 20px; border-radius: 4px; }
        .content.active { display: block; }
        label { display: block; font-size: 11px; margin-bottom: 5px; color: #6e7681; text-transform: uppercase; }
        textarea, input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #2ea043; color: var(--neon); border-radius: 4px; margin-bottom: 15px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; }
        button.main-btn { flex: 1; padding: 15px; background: transparent; border: 1px solid var(--neon); color: var(--neon); font-weight: bold; cursor: pointer; transition: 0.3s; }
        button.main-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }
        #terminal { background: #000; height: 120px; overflow-y: auto; padding: 10px; font-size: 11px; border: 1px solid #333; margin-top: 20px; color: #a5d6a7; border-radius: 4px; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.2; pointer-events: none; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">
    <h2>> CYBER_VAULT_PRO <small style="font-size: 10px; vertical-align: middle;">v6.0</small></h2>
    
    <label>MASTER KEY (Tüm işlemler için ortak şifre)</label>
    <input type="password" id="master-pwd" placeholder="Güçlü bir anahtar girin...">

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('text-box')">METİN KASASI</button>
        <button class="tab-btn" onclick="showTab('file-box')">DOSYA KİLİDİ</button>
        <button class="tab-btn" onclick="showTab('zip-box')">ZIP ARŞİVİ</button>
    </div>

    <div id="text-box" class="content active">
        <label>Girdi / Çıktı</label>
        <textarea id="text-input" rows="5" placeholder="Metni buraya girin..."></textarea>
        <div class="btn-group">
            <button class="main-btn" onclick="processText(true)">ŞİFRELE</button>
            <button class="main-btn" onclick="processText(false)">ÇÖZ</button>
        </div>
    </div>

    <div id="file-box" class="content">
        <label>Dosya Seçin</label>
        <input type="file" id="file-input">
        <div class="btn-group">
            <button class="main-btn" onclick="processFile(true)">DOSYAYI KİLİTLE</button>
            <button class="main-btn" onclick="processFile(false)">KİLİDİ AÇ</button>
        </div>
    </div>

    <div id="zip-box" class="content">
        <label>ZIP Yapılacak Dosya</label>
        <input type="file" id="zip-input">
        <div class="btn-group">
            <button class="main-btn" onclick="processZip(true)">SIKIŞTIR VE ŞİFRELE</button>
            <button class="main-btn" onclick="processZip(false)">ZIP ÇÖZ</button>
        </div>
    </div>

    <div id="terminal"></div>
</div>

<script>
// --- CORE CRYPTO ENGINE ---
async function deriveKey(password, salt) {
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
    return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
        baseKey, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
    );
}

function log(msg, type = 'info') {
    const t = document.getElementById('terminal');
    const color = type === 'err' ? '#ff003c' : (type === 'sys' ? '#00e5ff' : '#00ff41');
    t.innerHTML += `<div><span style="color:#666">[${new Date().toLocaleTimeString()}]</span> <span style="color:${color}">${msg}</span></div>`;
    t.scrollTop = t.scrollHeight;
}

function showTab(id) {
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

// --- TEXT ENCRYPTION ---
async function processText(isEnc) {
    const pwd = document.getElementById('master-pwd').value;
    const input = document.getElementById('text-input').value;
    if(!pwd || !input) return log("Eksik veri!", "err");

    try {
        if(isEnc) {
            const salt = crypto.getRandomValues(new Uint8Array(16));
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const key = await deriveKey(pwd, salt);
            const encrypted = await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, new TextEncoder().encode(input));
            const out = new Uint8Array(16 + 12 + encrypted.byteLength);
            out.set(salt,0); out.set(iv,16); out.set(new Uint8Array(encrypted),28);
            document.getElementById('text-input').value = btoa(String.fromCharCode(...out));
            log("Metin askeri düzeyde şifrelendi.");
        } else {
            const data = new Uint8Array(atob(input).split("").map(c => c.charCodeAt(0)));
            const key = await deriveKey(pwd, data.slice(0, 16));
            const dec = await crypto.subtle.decrypt({name:"AES-GCM", iv: data.slice(16, 28)}, key, data.slice(28));
            document.getElementById('text-input').value = new TextDecoder().decode(dec);
            log("Metin kilidi açıldı.", "sys");
        }
    } catch(e) { log("Hata: Şifre yanlış veya veri bozuk!", "err"); }
}

// --- FILE ENCRYPTION ---
async function processFile(isEnc) {
    const pwd = document.getElementById('master-pwd').value;
    const file = document.getElementById('file-input').files[0];
    if(!pwd || !file) return log("Dosya veya şifre yok!", "err");

    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            if(isEnc) {
                const salt = crypto.getRandomValues(new Uint8Array(16));
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const key = await deriveKey(pwd, salt);
                const result = await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, e.target.result);
                const out = new Uint8Array(16 + 12 + result.byteLength);
                out.set(salt, 0); out.set(iv, 16); out.set(new Uint8Array(result), 28);
                download(out, file.name + ".vault");
                log("Dosya şifrelendi: " + file.name + ".vault");
            } else {
                const data = new Uint8Array(e.target.result);
                const key = await deriveKey(pwd, data.slice(0, 16));
                const dec = await crypto.subtle.decrypt({name:"AES-GCM", iv: data.slice(16, 28)}, key, data.slice(28));
                download(new Uint8Array(dec), "decoded_" + file.name.replace(".vault", ""));
                log("Dosya çözüldü.", "sys");
            }
        } catch(err) { log("Dosya Hatası: Şifre yanlış!", "err"); }
    };
    reader.readAsArrayBuffer(file);
}

// --- ZIP + AES ---
async function processZip(isZip) {
    const pwd = document.getElementById('master-pwd').value;
    const file = document.getElementById('zip-input').files[0];
    if(!pwd || !file) return log("ZIP için veri eksik!", "err");

    try {
        if(isZip) {
            log("Sıkıştırma ve Şifreleme başlatıldı...", "sys");
            const bWriter = new zip.BlobWriter("application/zip");
            const zWriter = new zip.ZipWriter(bWriter, { password: pwd });
            await zWriter.add(file.name, new zip.BlobReader(file));
            await zWriter.close();
            download(await bWriter.getData(), file.name + ".secured.zip");
            log("Arşiv oluşturuldu.");
        } else {
            const zReader = new zip.ZipReader(new zip.BlobReader(file), { password: pwd });
            const entries = await zReader.getEntries();
            const data = await entries[0].getData(new zip.BlobWriter());
            download(data, entries[0].filename);
            await zReader.close();
            log("Arşiv başarıyla açıldı.", "sys");
        }
    } catch(e) { log("ZIP Hatası: Şifre yanlış veya geçersiz format.", "err"); }
}

function download(data, name) {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([data])); a.download = name; a.click();
}

// Matrix BG
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth, h = canvas.height = window.innerHeight;
const cols = Math.floor(w/20), drops = Array(cols).fill(0);
function draw() {
    ctx.fillStyle = 'rgba(5, 10, 15, 0.1)'; ctx.fillRect(0,0,w,h);
    ctx.fillStyle = '#0f0'; ctx.font = '15px Courier';
    drops.forEach((y, i) => {
        ctx.fillText(String.fromCharCode(0x30A0 + Math.random()*96), i*20, y*20);
        if(y*20 > h && Math.random() > 0.98) drops[i] = 0; else drops[i]++;
    });
}
setInterval(draw, 35);
log("Sistem aktif. Tüm işlemler AES-256-GCM ile zırhlıdır.");
</script>
</body>
</html>
