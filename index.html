<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CYBER_VAULT v7.0 | AES-256-GCM</title>
    <script src="https://cdn.jsdelivr.net/npm/@zip.js/zip.js/dist/zip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        :root { --n: #00ff41; --bg: #050a0f; }
        body { background: var(--bg); color: var(--n); font-family: 'Fira Code', monospace; padding: 20px; display: flex; justify-content: center; }
        .vault { background: rgba(0,0,0,0.9); border: 1px solid var(--n); padding: 25px; width: 100%; max-width: 700px; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        h2 { text-align: center; border-bottom: 1px dashed var(--n); padding-bottom: 10px; margin-top: 0; }
        .tab-menu { display: flex; gap: 5px; margin: 15px 0; }
        .tab-btn { flex: 1; padding: 10px; background: none; border: 1px solid #2ea043; color: #666; cursor: pointer; font-size: 11px; }
        .tab-btn.active { color: var(--n); border-color: var(--n); background: rgba(0,255,65,0.05); }
        .pane { display: none; padding: 15px; border: 1px solid #2ea043; border-top: none; }
        .pane.active { display: block; }
        label { display: block; font-size: 10px; margin: 10px 0 5px; color: #888; text-transform: uppercase; }
        textarea, input { width: 100%; padding: 12px; background: #000; border: 1px solid #2ea043; color: var(--n); box-sizing: border-box; margin-bottom: 10px; }
        .btns { display: flex; gap: 10px; }
        button.action { flex: 1; padding: 15px; background: none; border: 1px solid var(--n); color: var(--n); font-weight: bold; cursor: pointer; transition: 0.2s; }
        button.action:hover { background: var(--n); color: #000; }
        #log { background: #000; height: 100px; overflow-y: auto; padding: 10px; font-size: 11px; border: 1px solid #333; margin-top: 15px; color: #a5d6a7; }
    </style>
</head>
<body>

<div class="vault">
    <h2>> CYBER_VAULT_FINAL <small>v7.0</small></h2>
    
    <label>MASTER KEY (TÜM İŞLEMLER İÇİN ŞİFRE)</label>
    <input type="password" id="m-key" placeholder="Şifreniz...">

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchT('t-pane')">METİN</button>
        <button class="tab-btn" onclick="switchT('f-pane')">DOSYA (FOTO/PDF)</button>
        <button class="tab-btn" onclick="switchT('z-pane')">ZIP</button>
    </div>

    <div id="t-pane" class="pane active">
        <textarea id="t-input" rows="5" placeholder="Şifrelenecek metin veya Base64 kod..."></textarea>
        <div class="btns">
            <button class="action" onclick="doText(true)">ŞİFRELE</button>
            <button class="action" onclick="doText(false)">ÇÖZ</button>
        </div>
    </div>

    <div id="f-pane" class="pane">
        <input type="file" id="f-input">
        <div class="btns">
            <button class="action" onclick="doFile(true)">DOSYA KİLİTLE</button>
            <button class="action" onclick="doFile(false)">KİLİDİ AÇ</button>
        </div>
    </div>

    <div id="z-pane" class="pane">
        <input type="file" id="z-input">
        <div class="btns">
            <button class="action" onclick="doZip(true)">SIKIŞTIR & ŞİFRELE</button>
            <button class="action" onclick="doZip(false)">ARŞİVİ AÇ</button>
        </div>
    </div>

    <div id="log">Sistem hazır. AES-256-GCM devrede.</div>
</div>

<script>
// --- KRİPTO MOTORU ---
async function getK(p, s) {
    const e = new TextEncoder();
    const b = await crypto.subtle.importKey("raw", e.encode(p), "PBKDF2", false, ["deriveKey"]);
    return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: s, iterations: 100000, hash: "SHA-256" },
        b, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
    );
}

function log(m, err=false) {
    const l = document.getElementById('log');
    l.innerHTML += `<div><span style="color:${err?'#ff003c':'#00ff41'}">>> ${m}</span></div>`;
    l.scrollTop = l.scrollHeight;
}

function switchT(id) {
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

// --- METİN İŞLEM ---
async function doText(enc) {
    const p = document.getElementById('m-key').value;
    const i = document.getElementById('t-input').value;
    if(!p || !i) return log("Eksik veri!", true);
    try {
        if(enc) {
            const s = crypto.getRandomValues(new Uint8Array(16)), v = crypto.getRandomValues(new Uint8Array(12));
            const k = await getK(p, s);
            const res = await crypto.subtle.encrypt({name:"AES-GCM", iv:v}, k, new TextEncoder().encode(i));
            const out = new Uint8Array(16 + 12 + res.byteLength);
            out.set(s,0); out.set(v,16); out.set(new Uint8Array(res),28);
            document.getElementById('t-input').value = btoa(String.fromCharCode(...out));
            log("Metin zırhlandı.");
        } else {
            const d = new Uint8Array(atob(i).split("").map(c => c.charCodeAt(0)));
            const k = await getK(p, d.slice(0,16));
            const dec = await crypto.subtle.decrypt({name:"AES-GCM", iv:d.slice(16,28)}, k, d.slice(28));
            document.getElementById('t-input').value = new TextDecoder().decode(dec);
            log("Metin çözüldü.");
        }
    } catch(e) { log("Şifre yanlış veya bozuk veri!", true); }
}

// --- DOSYA İŞLEM ---
async function doFile(enc) {
    const p = document.getElementById('m-key').value;
    const f = document.getElementById('f-input').files[0];
    if(!p || !f) return log("Dosya seçilmedi!", true);
    const buf = await f.arrayBuffer();
    try {
        if(enc) {
            const s = crypto.getRandomValues(new Uint8Array(16)), v = crypto.getRandomValues(new Uint8Array(12));
            const k = await getK(p, s);
            const res = await crypto.subtle.encrypt({name:"AES-GCM", iv:v}, k, buf);
            const out = new Uint8Array(16 + 12 + res.byteLength);
            out.set(s,0); out.set(v,16); out.set(new Uint8Array(res),28);
            dl(out, f.name + ".vault"); log("Dosya kilitlendi.");
        } else {
            const d = new Uint8Array(buf);
            const k = await getK(p, d.slice(0,16));
            const dec = await crypto.subtle.decrypt({name:"AES-GCM", iv:d.slice(16,28)}, k, d.slice(28));
            dl(dec, "decoded_" + f.name.replace(".vault","")); log("Dosya açıldı.");
        }
    } catch(e) { log("Dosya çözülemedi!", true); }
}

// --- ZIP İŞLEM ---
async function doZip(isZ) {
    const p = document.getElementById('m-key').value;
    const f = document.getElementById('z-input').files[0];
    if(!p || !f) return log("ZIP için veri eksik!", true);
    try {
        if(isZ) {
            const bW = new zip.BlobWriter("application/zip");
            const zW = new zip.ZipWriter(bW, { password: p });
            await zW.add(f.name, new zip.BlobReader(f));
            await zW.close();
            dl(await bW.getData(), f.name + ".secure.zip"); log("ZIP oluşturuldu.");
        } else {
            const zR = new zip.ZipReader(new zip.BlobReader(f), { password: p });
            const ent = await zR.getEntries();
            const d = await ent[0].getData(new zip.BlobWriter());
            dl(d, ent[0].filename); await zR.close(); log("ZIP açıldı.");
        }
    } catch(e) { log("ZIP şifresi yanlış!", true); }
}

function dl(d, n) {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([d])); a.download = n; a.click();
}
</script>
</body>
</html>
