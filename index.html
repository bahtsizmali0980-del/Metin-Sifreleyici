<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER_VAULT v5.0 | AES-256-GCM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        :root { --neon: #00ff41; --bg: #050a0f; --glass: rgba(5, 10, 15, 0.9); }
        body { background: var(--bg); color: var(--neon); font-family: 'Fira Code', monospace; display: flex; justify-content: center; padding: 20px; }
        .container { background: var(--glass); border: 1px solid var(--neon); padding: 25px; width: 100%; max-width: 700px; box-shadow: 0 0 20px rgba(0,255,65,0.2); border-radius: 8px; z-index: 2; }
        h2 { text-align: center; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon); margin-top: 0; }
        .section { margin-bottom: 20px; border-bottom: 1px dashed #2ea043; padding-bottom: 20px; }
        label { font-size: 12px; display: block; margin: 10px 0 5px; color: #6e7681; }
        textarea, input { width: 100%; padding: 12px; background: #000; border: 1px solid #2ea043; color: var(--neon); border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; background: transparent; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        #terminal { background: #000; height: 100px; overflow-y: auto; padding: 10px; font-size: 11px; border: 1px solid #333; margin-top: 15px; color: #a5d6a7; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

<canvas id="m"></canvas>

<div class="container">
    <h2>> REAL_ENCRYPTOR <small style="font-size: 10px;">v5.0</small></h2>
    
    <div class="section">
        <label>GÜVENLİK ANAHTARI (Şifreyi Çözmek İçin Şarttır!)</label>
        <input type="password" id="master-key" placeholder="Kırılamaz bir anahtar belirleyin...">
        
        <label>METİN GİRİŞİ / ŞİFRELİ VERİ</label>
        <textarea id="data-input" rows="4" placeholder="Şifrelenecek düz metni veya çözülecek kodu buraya yapıştırın..."></textarea>
        
        <div class="btn-group">
            <button onclick="cipherAction(true)">METNİ KİLİTLE (ENCRYPT)</button>
            <button onclick="cipherAction(false)">KİLİDİ AÇ (DECRYPT)</button>
        </div>
    </div>

    <label>SİSTEM GÜNLÜĞÜ</label>
    <div id="terminal"></div>
</div>

<script>
// --- KRİPTOGRAFİ MOTORU (AES-256-GCM) ---

async function deriveKey(pwd, salt) {
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey("raw", enc.encode(pwd), "PBKDF2", false, ["deriveKey"]);
    return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
        baseKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt", "decrypt"]
    );
}

async function cipherAction(isEncrypt) {
    const pwd = document.getElementById('master-key').value;
    const input = document.getElementById('data-input').value;
    const term = document.getElementById('terminal');

    if (!pwd || !input) {
        term.innerHTML += `<div style="color:red">>> HATA: Anahtar veya veri eksik!</div>`;
        return;
    }

    try {
        if (isEncrypt) {
            const salt = crypto.getRandomValues(new Uint8Array(16));
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const key = await deriveKey(pwd, salt);
            
            const encodedData = new TextEncoder().encode(input);
            const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, encodedData);
            
            // Paket oluştur: Salt(16) + IV(12) + Data
            const packet = new Uint8Array(16 + 12 + encrypted.byteLength);
            packet.set(salt, 0);
            packet.set(iv, 16);
            packet.set(new Uint8Array(encrypted), 28);
            
            // Base64 olarak çıktı ver
            document.getElementById('data-input').value = btoa(String.fromCharCode(...packet));
            term.innerHTML += `<div>[${new Date().toLocaleTimeString()}] Metin AES-256 ile zırhlandı.</div>`;
        } else {
            const packet = new Uint8Array(atob(input).split("").map(c => c.charCodeAt(0)));
            const salt = packet.slice(0, 16);
            const iv = packet.slice(16, 28);
            const data = packet.slice(28);
            
            const key = await deriveKey(pwd, salt);
            const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
            
            document.getElementById('data-input').value = new TextDecoder().decode(decrypted);
            term.innerHTML += `<div style="color:cyan">[${new Date().toLocaleTimeString()}] Erişim sağlandı. Veri çözüldü.</div>`;
        }
    } catch (e) {
        term.innerHTML += `<div style="color:red">>> ERİŞİM REDDEDİLDİ: Hatalı anahtar veya bozuk veri!</div>`;
    }
    term.scrollTop = term.scrollHeight;
}

// Matrix Efekti
const c = document.getElementById("m"), ctx = c.getContext("2d");
let w = c.width = window.innerWidth, h = c.height = window.innerHeight;
const columns = Math.floor(w/20), drops = Array(columns).fill(1);
function draw() {
    ctx.fillStyle = "rgba(5, 10, 15, 0.05)"; ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = "#0f0"; ctx.font = "15px monospace";
    drops.forEach((y, i) => {
        const txt = String.fromCharCode(Math.random()*128);
        ctx.fillText(txt, i*20, y*20);
        if (y*20 > h && Math.random() > 0.975) drops[i] = 0; drops[i]++;
    });
}
setInterval(draw, 33);
</script>

</body>
</html>
